<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Add the <meta> tag for character encoding (UTF-8). -->
    <meta charset="UTF-8">

    <!-- Add the responsive viewport <meta> tag -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Add a <title>, e.g., "Manage Weekly Breakdown". -->
    <title>Manage Weekly Breakdown</title>

    <!-- Link to your CSS framework or stylesheet. -->
    <link rel="stylesheet" href="styles.css">

    <!-- Required: link admin.js with defer. -->
    <script src="admin.js" defer></script>
</head>
<body>

    <!-- Create a <header> containing an <h1> "Manage Weekly Breakdown". -->
    <header>
        <h1>Manage Weekly Breakdown</h1>
    </header>

    <!-- Create the <main> content area. -->
    <main>

        <!-- ============================================================
             Section 1: Add / Edit Week Form
             ============================================================ -->
        <!-- Create a <section> for the form. -->
        <section>
            <!-- Add a sub-heading <h2> "Add a New Week". -->
            <h2>Add a New Week</h2>

            <!-- Create a <form id="week-form"> (action can be "#").
                 The id is required by admin.js. -->
            <form id="week-form" action="#">
                <!-- Use a <fieldset> to group the form controls. -->
                <fieldset>
                    <!-- Add a <legend>, e.g., "Weekly Details". -->
                    <legend>Weekly Details</legend>

                    <!-- Add a <label> and <input> for the week title. -->
                    <label for="week-title">Week Title:</label>
                    <input id="week-title" type="text" placeholder="Week 1: Introduction to HTML" required>

                    <!-- Add a <label> and <input> for the start date. -->
                    <label for="week-start-date">Start Date:</label>
                    <input id="week-start-date" type="date" required>

                    <!-- Add a <label> and <textarea> for the week description. -->
                    <label for="week-description">Description:</label>
                    <textarea id="week-description" rows="5"></textarea>

                    <!-- Add a <label> and <textarea> for resource links (one URL per line). -->
                    <label for="week-links">Resource Links (one URL per line):</label>
                    <textarea id="week-links" rows="3"></textarea>

                    <!-- Add a submit <button>. -->
                    <button id="add-week" type="submit">Add Week</button>
                </fieldset>
            </form>
        </section>


        <!-- ============================================================
             Section 2: Existing Weekly Entries
             ============================================================ -->
        <!-- Create a <section> to display the current list of weeks. -->
        <section>
            <!-- Add a sub-heading <h2> "Current Weekly Breakdown". -->
            <h2>Current Weekly Breakdown</h2>

            <!-- Create a <table id="weeks-table">. -->
            <table id="weeks-table">
                <!-- Create a <thead> with a <tr> containing <th> elements -->
                <thead>
                    <tr>
                        <th>Week Title</th>
                        <th>Start Date</th>
                        <th>Description</th>
                        <th>Actions</th>
                    </tr>
                </thead>

                <!-- Create a <tbody id="weeks-tbody">.
                     The id is required by admin.js so it can inject
                     <tr> rows. admin.js will clear and repopulate this
                     tbody whenever the data changes. -->
                <tbody id="weeks-tbody">
                    <!-- admin.js will inject rows here. -->
                </tbody>
            </table>
        </section>

    </main>
</body>
</html>

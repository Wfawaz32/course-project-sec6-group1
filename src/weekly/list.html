<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Add meta tags for charset (UTF-8) and viewport (width=device-width, initial-scale=1.0). -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Add a <title> -->
    <title>Weekly Course Breakdown</title>

    <!-- Link to your CSS framework or stylesheet. -->
    <link rel="stylesheet" href="styles.css">

    <!-- Required: link list.js with defer so the DOM is ready before the script runs. -->
    <script src="list.js" defer></script>
</head>
<body>

    <!-- Create a <header> containing an <h1> "Weekly Course Breakdown". -->
    <header>
        <h1>Weekly Course Breakdown</h1>
    </header>

    <!-- Create the <main> content area. -->
    <main>

        <!-- Create a <section id="week-list-section"> to contain the
             list of week articles. The id is required by list.js. -->
        <section id="week-list-section">
            <!-- list.js will inject one <article> per week here.
                 Each article follows the structure below:
                 
                 <article>
                     <h2>Week 1: Introduction to HTML</h2>
                     <p>Starts on: 2025-01-13</p>
                     <p>Learn HTML fundamentals...</p>
                     <a href="details.html?id=1">View Details & Discussion</a>
                 </article>
            -->
        </section>
        <!-- End of #week-list-section -->

    </main>
    <!-- End of <main> -->

</body>
</html>

<!--
  Requirement: Create the Admin View for Assignments

  Instructions:
  Fill in the HTML elements as described in the comments.
  This page allows the teacher (admin) to perform full CRUD operations
  on course assignments.
-->
<!DOCTYPE html>
<html lang="en"> 
<head>
    <!-- Add the <meta> tag for character encoding (UTF-8). -->
    <meta charset="UTF-8">

    <!-- Add the responsive viewport <meta> tag
         (width=device-width, initial-scale=1.0). -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Add a <title>, e.g., "Manage Assignments". -->
    <title>Manage Assignments</title>

    <!-- Link to your CSS framework or stylesheet. -->
    <link rel="stylesheet" href="style.css">

    <!-- Required: link admin.js with defer. -->
    <script src="admin.js" defer></script>
</head>
<body>

    <!-- Create a <header> containing an <h1> "Manage Assignments". -->
    <header>
        <h1>Manage Assignments</h1>
    </header>

    <!-- Create the <main> content area. -->
    <main>

        <!-- ============================================================
             Section 1: Add / Edit Assignment Form
             ============================================================ -->
        <!-- Create a <section> for the form. -->
        <section>
            <!-- Add a sub-heading <h2> "Add a New Assignment". -->
            <h2>Add a New Assignment</h2>

            <!-- Create a <form id="assignment-form"> (action can be "#").
                 The id is required by admin.js. -->
            <form id="assignment-form" action="#">

                <!-- Use a <fieldset> to group the form controls. -->
                <fieldset>
                    <!-- Add a <legend>, e.g., "Assignment Details". -->
                    <legend>Assignment Details</legend>

                    <!-- Add a <label> and <input> for the assignment title.
                         - label for="assignment-title"
                         - input id="assignment-title", type="text", required -->
                    <label for="assignment-title">Title:</label>
                    <input id="assignment-title" type="text" required>

                    <!-- Add a <label> and <textarea> for the description.
                         - label for="assignment-description"
                         - textarea id="assignment-description", rows="5", required
                         - Maps to the description column in the assignments table. -->
                    <label for="assignment-description">Description:</label>
                    <textarea id="assignment-description" rows="5" required></textarea>

                    <!-- Add a <label> and <input> for the due date.
                         - label for="assignment-due-date"
                         - input id="assignment-due-date", type="date", required
                         - Maps to the due_date column in the assignments table. -->
                    <label for="assignment-due-date">Due Date:</label>
                    <input id="assignment-due-date" type="date" required>

                    <!-- Add a <label> and <textarea> for attached file URLs
                         (one URL per line).
                         - label for="assignment-files"
                         - textarea id="assignment-files", rows="3"
                         - Maps to the files column (JSON array) in the
                           assignments table. admin.js will split the textarea
                           value on newlines and send it as an array. -->
                    <label for="assignment-files">Attached File URLs (one per line):</label>
                    <textarea id="assignment-files" rows="3"></textarea>

                    <!-- Add a submit <button>.
                         - id="add-assignment", type="submit"
                         - Text: "Add Assignment"
                         - When the form is in edit mode, admin.js will
                           change the button text to "Update Assignment" and
                           store the id being edited in a data attribute. -->
                    <button id="add-assignment" type="submit">Add Assignment</button>
                </fieldset>
            </form>
        </section>


        <!-- ============================================================
             Section 2: Existing Assignments Table
             ============================================================ -->
        <!-- Create a <section> to display the current list of
             assignments. -->
        <section>
            <!-- Add a sub-heading <h2> "Current Assignments". -->
            <h2>Current Assignments</h2>

            <!-- Create a <table id="assignments-table">. -->
            <table id="assignments-table">

                <!-- Create a <thead> with a <tr> containing <th>
                     elements:
                     - "Title"
                     - "Due Date"
                     - "Description"
                     - "Actions"
                     The columns must match the data rendered by
                     admin.js createAssignmentRow(). -->
                <thead>
                    <tr>
                        <th>Title</th>
                        <th>Due Date</th>
                        <th>Description</th>
                        <th>Actions</th>
                    </tr>
                </thead>

                <!-- Create a <tbody id="assignments-tbody">.
                     The id is required by admin.js so it can inject
                     <tr> rows. admin.js will clear and repopulate this
                     tbody whenever the data changes. -->
                <tbody id="assignments-tbody">
                    <!-- admin.js will inject rows here. Each row follows
                         this structure (do NOT hardcode real data):

                    <tr>
                        <td>HTML &amp; CSS Portfolio</td>
                        <td>2025-02-15</td>
                        <td>Create a responsive portfolio...</td>
                        <td>
                            <button class="edit-btn"   data-id="1">Edit</button>
                            <button class="delete-btn" data-id="1">Delete</button>
                        </td>
                    </tr>

                    The data-id attribute holds the integer id from the
                    assignments table (primary key). -->
                </tbody>

            </table>
        </section>

    </main>
</body>
</html>

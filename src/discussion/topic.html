<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Topic Details</title>

    <link rel="stylesheet" href="discussion.css">

    <script src="topic.js" defer></script>
</head>

<body>

    <header>
        <h1 id="topic-subject"></h1>
    </header>

    <main>

        <!-- ============================================================
             Original Post
        ============================================================ -->
        <article id="original-post">

            <p id="op-message"></p>

            <footer id="op-footer"></footer>

            <div id="op-actions">
                <!-- topic.js will inject edit/delete buttons here -->
            </div>

        </article>

        <!-- ============================================================
             Replies Section
        ============================================================ -->
        <section id="replies-section">

            <h2>Replies</h2>

            <div id="reply-list-container">

                <!-- Replies will be injected here by topic.js -->

                <!-- Example (for reference only)
                <article>
                    <p>Great explanation!</p>

                    <footer>
                        Posted by: Ahmed on 2026-05-10
                    </footer>

                    <div>
                        <button class="delete-reply-btn" data-id="1">
                            Delete
                        </button>
                    </div>
                </article>
                -->

            </div>

            <!-- ============================================================
                 Add Reply Form
            ============================================================ -->
            <form id="reply-form" action="#">

                <fieldset>
                    <legend>Your Reply</legend>

                    <label for="new-reply">Reply</label>
                    <textarea id="new-reply" required></textarea>

                    <button type="submit">Post Reply</button>
                </fieldset>

            </form>

        </section>

    </main>

</body>
</html>

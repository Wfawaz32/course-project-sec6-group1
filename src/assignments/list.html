<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Assignments</title>
    <link rel="stylesheet" href="style.css">
    <script src="list.js" defer></script>
</head>
<body>
 
    <header>
        <h1>Course Assignments</h1>
    </header>
 
    <main>
        <section id="assignment-list-section">
            <!-- list.js will inject one <article> per assignment here.
                 Each article follows this structure:
 
                 <article>
                     <h2>Assignment Title</h2>
                     <p>Due: YYYY-MM-DD</p>
                     <p>Assignment description goes here.</p>
                     <a href="details.html?id={id}">View Details &amp; Discussion</a>
                 </article>
            -->
        </section>
    </main>
 
</body>
</html>

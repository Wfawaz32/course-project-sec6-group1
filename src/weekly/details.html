<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Add <meta> tags for charset (UTF-8) and viewport -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Add a <title> -->
    <title>Week Details</title>

    <!-- Link to your CSS framework or stylesheet. -->
    <link rel="stylesheet" href="styles.css">

    <!-- Required: link details.js with defer. -->
    <script src="details.js" defer></script>
</head>
<body>

    <!-- Create a <header>. Inside it, add an <h1 id="week-title">. -->
    <header>
        <h1 id="week-title"></h1>
    </header>

    <!-- Create the <main> content area. -->
    <main>

        <!-- ============================================================
             Section 1: Weekly Information
             ============================================================ -->
        <!-- Use an <article> to display the main weekly information. -->
        <article>
            <!-- Add a <p id="week-start-date"> -->
            <p id="week-start-date"></p>

            <!-- Add a <h2> "Description & Notes". -->
            <h2>Description & Notes</h2>

            <!-- Add a <p id="week-description"> -->
            <p id="week-description"></p>

            <!-- Add a <h2> "Exercises & Resources". -->
            <h2>Exercises & Resources</h2>

            <!-- Add a <ul id="week-links-list"> -->
            <ul id="week-links-list"></ul>
        </article>


        <!-- ============================================================
             Section 2: Discussion Forum
             ============================================================ -->
        <!-- Create a <section id="discussion-forum">. -->
        <section id="discussion-forum">

            <!-- Add a <h2> "Discussion". -->
            <h2>Discussion</h2>

            <!-- Subsection 2.1: Existing Comments -->
            <!-- Add a <div id="comment-list"> -->
            <div id="comment-list"></div>

            <!-- Subsection 2.2: Add a Comment Form -->
            <!-- Create a <form id="comment-form"> -->
            <form id="comment-form" action="#">
                <!-- Use a <fieldset> to group the controls. -->
                <fieldset>
                    <!-- Add a <legend> -->
                    <legend>Leave a Comment</legend>

                    <!-- Add a <label> and <textarea> for the comment. -->
                    <label for="new-comment">Comment:</label>
                    <textarea id="new-comment" required></textarea>

                    <!-- Add a submit <button>. -->
                    <button type="submit">Post Comment</button>
                </fieldset>
            </form>

        </section>

    </main>
</body>
</html>

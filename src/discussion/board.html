<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discussion Board</title>

    <link rel="stylesheet" href="discussion.css">

    <script src="board.js" defer></script>
</head>

<body>

    <header>
        <h1>General Discussion Board</h1>
    </header>

    <main>

        <!-- ============================================================
             Create New Topic
        ============================================================ -->
        <section>
            <h2>Start a New Topic</h2>

            <form id="new-topic-form" action="#">
                <fieldset>
                    <legend>New Topic Details</legend>

                    <label for="topic-subject">Subject</label>
                    <input type="text" id="topic-subject" required>

                    <label for="topic-message">Message</label>
                    <textarea id="topic-message" rows="6" required></textarea>

                    <label for="topic-author">Author</label>
                    <input type="text" id="topic-author" required>

                    <button type="submit" id="create-topic">Create Topic</button>
                </fieldset>
            </form>
        </section>

        <!-- ============================================================
             Existing Topics
        ============================================================ -->
        <section>
            <h2>All Topics</h2>

            <div id="topic-list-container">

                <!-- JS will dynamically inject topics here -->

                <!-- Example structure (for reference only)
                <article>
                    <h3>
                        <a href="topic.html?id=1">Welcome to Web Development!</a>
                    </h3>

                    <footer>
                        Posted by: Admin on 2026-05-10
                    </footer>

                    <div>
                        <button class="edit-btn" data-id="1">Edit</button>
                        <button class="delete-btn" data-id="1">Delete</button>
                    </div>
                </article>
                -->

            </div>
        </section>

    </main>

</body>
</html>

<!--
  Requirement: Create the Dedicated Page for a Single Assignment

  Instructions:
  This page displays the full details for one assignment and allows
  students to read and post discussion comments.
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Add <meta> tags for charset (UTF-8) and viewport
         (width=device-width, initial-scale=1.0). -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Add a <title>, e.g., "Assignment Details". -->
    <title>Assignment Details</title>

    <!-- Link to your CSS framework or stylesheet. -->
    <link rel="stylesheet" href="style.css">

    <!-- Required: link details.js with defer. -->
    <script src="details.js" defer></script>
</head>
<body>

    <!-- Create a <header>.
         Inside it, add an <h1 id="assignment-title">.
         details.js will set its textContent to the assignment's title.
         Leave it empty for now. -->
    <header>
        <h1 id="assignment-title"></h1>
    </header>

    <!-- Create the <main> content area. -->
    <main>

        <!-- ============================================================
             Section 1: Assignment Information
             ============================================================ -->
        <!-- Use an <article> to display the main assignment
             information. -->
        <article>
            <!-- Add a <p id="assignment-due-date">.
                 details.js will set it to "Due: YYYY-MM-DD"
                 using the due_date column from the assignments table. -->
            <p id="assignment-due-date"></p>

            <!-- Add a <h2> "Description". -->
            <h2>Description</h2>

            <!-- Add a <p id="assignment-description">.
                 details.js will set its textContent to the assignment's
                 description from the assignments table. -->
            <p id="assignment-description"></p>

            <!-- Add a <h2> "Attached Files &amp; Links". -->
            <h2>Attached Files &amp; Links</h2>

            <!-- Add a <ul id="assignment-files-list">.
                 details.js will populate this list from the files column
                 in the assignments table. That column is a JSON-encoded
                 array of URL strings. Each URL becomes a
                 <li><a href="{url}">{url}</a></li> item.
                 Leave the list empty here. -->
            <ul id="assignment-files-list"></ul>
        </article>


        <!-- ============================================================
             Section 2: Discussion Forum
             ============================================================ -->
        <!-- Create a <section id="discussion-forum">. -->
        <section id="discussion-forum">

            <!-- Add a <h2> "Questions &amp; Discussion". -->
            <h2>Questions &amp; Discussion</h2>

            <!-- Subsection 2.1: Existing Comments -->
            <!-- Add a <div id="comment-list">.
                 details.js will inject one <article> per comment here.
                 Each comment article follows this structure:

                 <article>
                     <p>Comment text goes here.</p>
                     <footer>Posted by: Author Name</footer>
                 </article>

                 Comments come from the comments_assignment table
                 (columns: id, assignment_id, author, text, created_at).
                 Leave the div empty here. -->
            <div id="comment-list"></div>

            <!-- Subsection 2.2: Add a Comment Form -->
            <!-- Create a <form id="comment-form"> (action="#").
                 The id is required by details.js. -->
            <form id="comment-form" action="#">

                <!-- Use a <fieldset> to group the controls. -->
                <fieldset>
                    <!-- Add a <legend>, e.g., "Ask a Question". -->
                    <legend>Ask a Question</legend>

                    <!-- Add a <label> and <textarea> for the comment.
                         - label for="new-comment"
                         - textarea id="new-comment", required
                         - The id must be exactly "new-comment" as
                           details.js reads this element by that id. -->
                    <label for="new-comment">Your Comment:</label>
                    <textarea id="new-comment" required></textarea>

                    <!-- Add a submit <button>.
                         - type="submit"
                         - Text: "Post Comment" -->
                    <button type="submit">Post Comment</button>
                </fieldset>
            </form>

        </section>

    </main>
</body>
</html>
